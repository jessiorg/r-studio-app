# Nginx Configuration for RStudio Server
# Location: /data/docker/nginx/conf.d/rstudio.conf

# RStudio Server upstream
upstream rstudio_server {
    server rstudio-server:8787;
    keepalive 32;
}

# Main server block
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;  # Change to your domain
    
    # Logging
    access_log /var/log/nginx/rstudio-access.log;
    error_log /var/log/nginx/rstudio-error.log warn;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    
    # Client body size limit
    client_max_body_size 100M;
    
    # Timeouts
    client_body_timeout 300s;
    client_header_timeout 300s;
    keepalive_timeout 650s;
    send_timeout 300s;
    
    # RStudio Server location
    location /rstudio/ {
        # Rewrite path
        rewrite ^/rstudio/(.*)$ /$1 break;
        
        # Proxy settings
        proxy_pass http://rstudio_server;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (required for RStudio)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Timeouts (longer for R computations)
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # Buffering
        proxy_buffering off;
        proxy_redirect off;
        
        # Keep-alive
        proxy_socket_keepalive on;
    }
    
    # WebSocket upgrade mapping
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }
    
    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# WebSocket connection upgrade map (define at http level if not already defined)
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

