# RStudio Session Configuration
# /etc/rstudio/rsession.conf

# Session timeout
session-timeout-minutes=120
session-disconnected-timeout-minutes=120
session-quit-child-processes-on-exit=1

# Working directory
session-default-working-dir=~/workspace
session-default-new-project-dir=~/workspace

# R options
r-libs-user=~/R/library
r-cran-repos=https://cran.rstudio.com/

# Limits
limit-file-upload-size-mb=100
limit-rpc-client-uid=500
limit-cpu-time-minutes=0